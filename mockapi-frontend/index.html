<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MockAPI Generator</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #0f172a; 
            color: white; 
            padding: 40px 20px; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container { 
            width: 100%;
            max-width: 600px; 
            background: #1e293b; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h2 { color: #3b82f6; margin-top: 0; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #cbd5e1; }
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0 15px 0; 
            background: #334155; 
            border: 1px solid #475569; 
            border-radius: 6px; 
            color: white; 
            box-sizing: border-box; 
            font-size: 1rem;
        }
        input:focus, textarea:focus {
            border-color: #3b82f6;
            outline: none;
        }
        textarea { height: 180px; font-family: monospace; resize: vertical; }
        button { 
            width: 100%; 
            padding: 14px; 
            background: #3b82f6; 
            border: none; 
            border-radius: 6px; 
            color: white; 
            font-weight: bold; 
            font-size: 1rem;
            cursor: pointer; 
            transition: background 0.2s;
        }
        button:hover { background: #2563eb; }
        .result-box { 
            display: none; 
            margin-top: 25px; 
            padding: 15px; 
            background: #064e3b; 
            border: 1px solid #059669;
            border-radius: 6px; 
        }
        .result-box p { margin: 0 0 10px 0; color: #34d399; font-weight: bold; }
        a { color: #6ee7b7; font-weight: bold; word-break: break-all; text-decoration: underline; }
        a:hover { color: #a7f3d0; }
    </style>
</head>
<body>

    <div class="container">
        <h2>MockAPI - Tạo API giả lập tức thì 🚀</h2>
        <p style="color: #94a3b8; margin-bottom: 20px;">Nhập đường dẫn và dữ liệu trả về dạng JSON để tạo ngay một endpoint thật.</p>

        <label for="api-path">Đường dẫn API mong muốn (viết liền không dấu):</label>
        <input type="text" id="api-path" placeholder="Ví dụ: users, products, test-data" />

        <label for="api-json">Dữ liệu trả về (Định dạng JSON hợp lệ):</label>
        <textarea id="api-json" placeholder='[
  {
    "id": 1,
    "name": "Nguyen Van A",
    "role": "Developer"
  }
]'></textarea>

        <button id="generate-btn">Tạo Link API</button>

        <div class="result-box" id="result-box">
            <p>🎉 Link API thật của bạn đã sẵn sàng sử dụng:</p>
            <a href="#" id="api-link" target="_blank"></a>
        </div>
    </div>

    <script>
        document.getElementById('generate-btn').addEventListener('click', async () => {
            const path = document.getElementById('api-path').value.trim();
            const jsonText = document.getElementById('api-json').value.trim();

            if (!path || !jsonText) {
                return alert("Vui lòng nhập đầy đủ thông tin đường dẫn và dữ liệu JSON!");
            }

            // Kiểm tra tính hợp lệ của JSON trước khi gửi lên Server
            let parsedJson;
            try {
                parsedJson = JSON.parse(jsonText); 
            } catch (e) {
                return alert("Dữ liệu nhập vào không phải định dạng JSON hợp lệ! Hãy kiểm tra lại dấu ngoặc kép và dấu phẩy.");
            }

            try {
                // Gọi tới Backend localhost:5000 đã chạy ở bước trước
                const response = await fetch('http://localhost:5000/api/create-mock', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: path, data: parsedJson })
                });

                const result = await response.json();
                
                if (result.error) {
                    alert(result.error);
                } else {
                    const resultBox = document.getElementById('result-box');
                    const apiLink = document.getElementById('api-link');
                    
                    apiLink.innerText = result.mockUrl;
                    apiLink.href = result.mockUrl;
                    resultBox.style.display = 'block';
                }
            } catch (err) {
                alert("Không thể kết nối đến Backend! Hãy chắc chắn bạn đã chạy lệnh 'node server.js' ở thư mục backend.");
            }
        });
    </script>
</body>
</html>
